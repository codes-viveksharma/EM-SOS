<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>EmpowerAble – SOS Emergency</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #f0f2f8;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      overflow: hidden;
    }

    .phone {
      width: 100%;
      max-width: 400px;
      height: 100%;
      max-height: 780px;
      background: #ffffff;
      border-radius: 48px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.02);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    @media (min-height: 750px) and (min-width: 380px) {
      .phone {
        height: 90vh;
        border-radius: 44px;
      }
    }

    .screen-flash {
      position: absolute;
      inset: 0;
      background: rgba(220, 38, 38, 0);
      pointer-events: none;
      z-index: 100;
      border-radius: inherit;
    }

    .screen-flash.flash {
      animation: screen-shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97), flash-bg 0.4s ease-out;
    }

    @keyframes screen-shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-4px);
      }

      40% {
        transform: translateX(4px);
      }

      60% {
        transform: translateX(-3px);
      }

      80% {
        transform: translateX(3px);
      }
    }

    @keyframes flash-bg {
      0% {
        background: rgba(220, 38, 38, 0);
      }

      50% {
        background: rgba(220, 38, 38, 0.25);
      }

      100% {
        background: rgba(220, 38, 38, 0);
      }
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 18px 24px;
      gap: 18px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .content::-webkit-scrollbar {
      display: none;
    }

    /* header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #1f2937, #b91c1c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .header-text p {
      font-size: 11px;
      color: #6c757d;
      font-weight: 500;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #eef2ff;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 700;
      color: #15803d;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 4px #22c55e;
    }

    .status-badge.active-sos {
      background: #fee2e2;
      color: #b91c1c;
    }

    .status-badge.active-sos .status-dot {
      background: #dc2626;
      box-shadow: none;
    }

    /* SOS BUTTON */
    .sos-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 8px 0 4px;
    }

    .sos-button-wrapper {
      position: relative;
      width: 170px;
      height: 170px;
    }

    .progress-ring {
      position: absolute;
      top: -10px;
      left: -10px;
      width: 190px;
      height: 190px;
      transform: rotate(-90deg);
      pointer-events: none;
    }

    .progress-circle {
      fill: none;
      stroke: #dc2626;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 565;
      stroke-dashoffset: 565;
      transition: stroke-dashoffset 0.05s linear;
      filter: drop-shadow(0 0 4px #dc2626);
    }

    .sos-btn {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 30% 30%, #ef4444, #b91c1c);
      box-shadow: 0 12px 28px rgba(185, 28, 28, 0.3);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      font-family: inherit;
    }

    .sos-btn:active {
      transform: scale(0.96);
    }

    .sos-btn.vibrating {
      animation: vibrate 0.08s infinite;
    }

    .sos-btn.activated {
      background: radial-gradient(circle at 30% 30%, #b91c1c, #7f1a1a);
      box-shadow: 0 0 28px rgba(220, 38, 38, 0.8);
      animation: pulse-glow 1s infinite alternate;
    }

    @keyframes vibrate {
      0% {
        transform: translate(1px, 1px);
      }

      25% {
        transform: translate(-1px, -1px);
      }

      50% {
        transform: translate(2px, -1px);
      }

      75% {
        transform: translate(-1px, 1px);
      }

      100% {
        transform: translate(1px, 0);
      }
    }

    @keyframes pulse-glow {
      from {
        box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5);
      }

      to {
        box-shadow: 0 0 0 18px rgba(220, 38, 38, 0);
      }
    }

    .sos-icon {
      font-size: 34px;
      margin-bottom: 6px;
    }

    .sos-text {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* live status */
    .status-text {
      margin-top: 14px;
      font-size: 13px;
      font-weight: 600;
      color: #4b5563;
      text-align: center;
    }

    .status-text.active {
      color: #dc2626;
      font-weight: 700;
    }

    .location-display {
      margin-top: 8px;
      font-size: 11px;
      background: #f1f5f9;
      padding: 8px 14px;
      border-radius: 32px;
      color: #0f172a;
      text-align: center;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 95%;
      white-space: nowrap;
      overflow-x: auto;
    }

    .location-display i {
      color: #3b82f6;
    }

    /* SOS message panel */
    .sos-message-panel {
      background: #fff1f0;
      border-left: 5px solid #dc2626;
      border-radius: 20px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 4px 0 6px;
      font-size: 12px;
      font-weight: 500;
      color: #7f1a1a;
      animation: slideDown 0.3s ease;
    }

    .sos-message-panel i:first-child {
      font-size: 24px;
      color: #dc2626;
    }

    .msg-text {
      flex: 1;
      line-height: 1.4;
    }

    .msg-text a {
      color: #b91c1c;
      font-weight: 600;
      text-decoration: underline;
    }

    .close-msg {
      cursor: pointer;
      padding: 4px;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Cards */
    .card {
      background: #ffffff;
      border-radius: 28px;
      padding: 14px 16px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02), 0 0 0 1px #edf2f7;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-btn {
      color: #3b82f6;
      font-size: 11px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .add-btn i {
      font-size: 12px;
    }

    /* Inline add contact form */
    .add-contact-form {
      background: #f8fafc;
      border-radius: 24px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
    }

    .form-field {
      margin-bottom: 10px;
    }

    .form-field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: 0.1s;
    }

    .form-field input:focus {
      border-color: #dc2626;
      box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.1);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .form-actions button {
      padding: 6px 14px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }

    .save-contact {
      background: #dc2626;
      color: white;
    }

    .cancel-contact {
      background: #e2e8f0;
      color: #1e293b;
    }

    /* contacts rows */
    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .contact-row:last-child {
      margin-bottom: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      border-radius: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }

    .avatar.second {
      background: linear-gradient(135deg, #3b82f6, #1e40af);
    }

    .contact-info {
      flex: 1;
    }

    .contact-name {
      font-weight: 700;
      font-size: 14px;
      color: #0f172a;
    }

    .contact-role {
      font-size: 10px;
      color: #6c757d;
    }

    .call-btn {
      width: 38px;
      height: 38px;
      background: #eef2ff;
      border-radius: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #dc2626;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
      transition: 0.1s;
    }

    .call-btn:active {
      background: #e2e8f0;
      transform: scale(0.94);
    }

    /* quick grid */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 4px;
    }

    .q-btn {
      background: #f8fafc;
      border: 1px solid #eef2f8;
      border-radius: 20px;
      padding: 12px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 11px;
      color: #1e293b;
      cursor: pointer;
      transition: 0.1s;
    }

    .q-btn:active {
      background: #ffffff;
      transform: scale(0.96);
    }

    .q-icon {
      font-size: 20px;
    }

    .q-police {
      color: #3b82f6;
    }

    .q-ambulance {
      color: #dc2626;
    }

    .q-location {
      color: #10b981;
    }

    /* toggles */
    .toggles-row {
      display: flex;
      gap: 12px;
    }

    .toggle-box {
      flex: 1;
      background: #f8fafc;
      border: 1px solid #eef2f8;
      border-radius: 32px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: 0.1s;
    }

    .toggle-box:active {
      background: #f1f5f9;
    }

    .toggle-label {
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #0f172a;
    }

    .switch {
      width: 38px;
      height: 20px;
      background: #cbd5e1;
      border-radius: 20px;
      position: relative;
      transition: 0.2s;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-box.on .switch {
      background: #dc2626;
    }

    .toggle-box.on .switch::after {
      transform: translateX(18px);
    }

    /* toast */
    .toast {
      position: absolute;
      top: 20px;
      left: 16px;
      right: 16px;
      background: #1e293b;
      color: white;
      padding: 12px 16px;
      border-radius: 24px;
      font-size: 12px;
      font-weight: 500;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      transform: translateY(-120px);
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(4px);
    }

    .toast.show {
      transform: translateY(0);
    }

    .toast i {
      font-size: 22px;
      color: #ef4444;
    }

    .toast div {
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="phone">
    <div class="screen-flash" id="flashOverlay"></div>
    <div class="toast" id="toastMsg">
      <i class="fas fa-exclamation-triangle"></i>
      <div>
        <div id="toastTitle" style="font-weight:800; font-size:14px;">Notification</div>
        <div id="toastDesc" style="font-size:10px; opacity:0.9;">System is updating</div>
      </div>
    </div>

    <div class="content">
      <!-- Header -->
      <div class="header">
        <div class="header-text">
          <h1>SOS Emergency</h1>
          <p>EmpowerAble • your safety, one tap away</p>
        </div>
        <div class="status-badge" id="statusBadge">
          <div class="status-dot"></div>
          <span id="statusText">Active</span>
        </div>
      </div>

      <!-- SOS Button -->
      <div class="sos-container">
        <div class="sos-button-wrapper">
          <svg class="progress-ring" viewBox="0 0 190 190">
            <circle class="progress-circle" cx="95" cy="95" r="88" stroke="currentColor" stroke-width="6" fill="none" />
          </svg>
          <button class="sos-btn" id="sosBtn">
            <i class="fas fa-hand-holding-heart sos-icon"></i>
            <div class="sos-text" id="sosText">HOLD FOR SOS</div>
            <div style="font-size: 9px; opacity:0.8; margin-top:4px;">2 sec</div>
          </button>
        </div>
        <div class="status-text" id="holdStatus">Location ready • Press and hold</div>
        <div class="location-display" id="addressDisplay">
          <i class="fas fa-map-marker-alt"></i> <span id="locText">Fetching location...</span>
        </div>
      </div>

      <!-- SOS message container -->
      <div id="sosMessageContainer"></div>

      <!-- Emergency Contacts Card -->
      <div class="card">
        <div class="card-title">
          <span><i class="fas fa-address-book" style="margin-right: 6px; color:#dc2626;"></i> Emergency Contacts</span>
          <span class="add-btn" id="showAddContactBtn"><i class="fas fa-plus-circle"></i> Add Contact</span>
        </div>
        <div id="contactsList"></div>
        <!-- Inline add contact form (hidden by default) -->
        <div id="inlineContactForm" style="display: none;" class="add-contact-form">
          <div class="form-field">
            <input type="text" id="contactName" placeholder="Full name" autocomplete="off">
          </div>
          <div class="form-field">
            <input type="tel" id="contactPhone" placeholder="Phone number (e.g., +91XXXXXXXXXX)" autocomplete="off">
          </div>
          <div class="form-actions">
            <button class="cancel-contact" id="cancelAddContact">Cancel</button>
            <button class="save-contact" id="saveNewContact">Save Contact</button>
          </div>
        </div>
      </div>

      <!-- Quick Actions Grid -->
      <div class="card" style="padding-bottom: 12px;">
        <div class="quick-grid">
          <div class="q-btn" id="policeBtn">
            <i class="fas fa-shield-alt q-icon q-police"></i>
            <span>Call Police</span>
          </div>
          <div class="q-btn" id="ambulanceBtn">
            <i class="fas fa-truck-medical q-icon q-ambulance"></i>
            <span>Ambulance</span>
          </div>
          <div class="q-btn" id="shareLocationBtn">
            <i class="fas fa-share-alt q-icon q-location"></i>
            <span>Share Location</span>
          </div>
        </div>
      </div>

      <!-- Extra Features Toggles -->
      <div class="toggles-row">
        <div class="toggle-box" id="alarmToggleBox">
          <div class="toggle-label"><i class="fas fa-bell"></i> Alarm</div>
          <div class="switch"></div>
        </div>
        <div class="toggle-box" id="voiceToggleBox">
          <div class="toggle-label"><i class="fas fa-microphone-alt"></i> Voice Assist</div>
          <div class="switch"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ------------------------------ API & CONFIG ---------------------------------
    const GEOCODING_API_KEY = "AIzaSyBdbODDYbwpfoZZbMmHCYUNBdv-I7UoHkU";

    // ------------------------------ GLOBAL STATE --------------------------------
    let currentLocation = null;
    let locationReady = false;
    let isSOSActive = false;
    let holdInterval = null;
    let holdProgress = 0;
    const maxOffset = 565;
    const progressCircle = document.querySelector('.progress-circle');
    progressCircle.style.strokeDasharray = maxOffset;
    progressCircle.style.strokeDashoffset = maxOffset;

    // Contacts array
    let contacts = [
      { id: 'c1', name: 'Emma Watson', phone: '+15550101', avatar: 'EW' },
      { id: 'c2', name: 'James Carter', phone: '+15550102', avatar: 'JC' }
    ];

    // DOM elements
    const sosBtn = document.getElementById('sosBtn');
    const sosTextSpan = document.getElementById('sosText');
    const holdStatusSpan = document.getElementById('holdStatus');
    const statusBadge = document.getElementById('statusBadge');
    const statusTextSpan = document.getElementById('statusText');
    const flashOverlay = document.getElementById('flashOverlay');
    const toastEl = document.getElementById('toastMsg');
    const toastTitle = document.getElementById('toastTitle');
    const toastDesc = document.getElementById('toastDesc');
    const locTextSpan = document.getElementById('locText');
    const sosMsgContainer = document.getElementById('sosMessageContainer');
    const policeBtn = document.getElementById('policeBtn');
    const ambulanceBtn = document.getElementById('ambulanceBtn');
    const shareLocationBtn = document.getElementById('shareLocationBtn');
    const showAddContactBtn = document.getElementById('showAddContactBtn');
    const contactsListDiv = document.getElementById('contactsList');
    const inlineForm = document.getElementById('inlineContactForm');
    const contactNameInput = document.getElementById('contactName');
    const contactPhoneInput = document.getElementById('contactPhone');
    const saveContactBtn = document.getElementById('saveNewContact');
    const cancelAddBtn = document.getElementById('cancelAddContact');
    const alarmBox = document.getElementById('alarmToggleBox');
    const voiceBox = document.getElementById('voiceToggleBox');

    let alarmActive = false;
    let alarmInterval = null;
    let voiceActive = false;
    let mediaStream = null;

    // ------------------------------ GEOLOCATION + REVERSE GEOCODING -------------
    let locationWatchId = null;

    async function getLiveLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          locTextSpan.innerText = "Geolocation not supported by browser.";
          resolve(null);
          return;
        }

        // Start continuous tracking for real live location
        if (!locationWatchId) {
          locationWatchId = navigator.geolocation.watchPosition(
            async (pos) => {
              const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
              currentLocation = coords;
              locationReady = true;
              await updateAddressFromCoords(coords.lat, coords.lng);
              resolve(coords);
            },
            async (err) => {
              console.warn("Location error:", err);
              if (!locationReady) {
                locTextSpan.innerText = "Location Unknown - GPS Denied or Off";
                resolve(null);
              }
            },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
          );
        } else {
          resolve(currentLocation);
        }
      });
    }

    async function updateAddressFromCoords(lat, lng) {
      try {
        const url = `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${GEOCODING_API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.results && data.results.length > 0) {
          const address = data.results[0].formatted_address;
          locTextSpan.innerText = address.length > 45 ? address.slice(0, 42) + '...' : address;
        } else {
          locTextSpan.innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        }
      } catch (e) {
        locTextSpan.innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      }
    }

    function getLocationLink() {
      if (!currentLocation) return "Location Unavailable";
      return `https://www.google.com/maps?q=${currentLocation.lat},${currentLocation.lng}`;
    }

    // ------------------------------ SOS ACTIVATION ------------------------------
    function showSOSMessagePanel() {
      const existing = document.querySelector('.sos-message-panel');
      if (existing) existing.remove();
      const link = getLocationLink();
      const latLng = currentLocation ? `${currentLocation.lat.toFixed(5)}, ${currentLocation.lng.toFixed(5)}` : "Unknown";
      const panel = document.createElement('div');
      panel.className = 'sos-message-panel';
      panel.innerHTML = `
      <i class="fas fa-broadcast-tower"></i>
      <div class="msg-text">
        <strong>Emergency alert sent!</strong><br>
        Location: ${latLng}<br>
        ${currentLocation ? `<a href="${link}" target="_blank">Open in Maps →</a>` : '<i>Enable GPS for map link</i>'}
      </div>
      <i class="fas fa-times close-msg"></i>
    `;
      sosMsgContainer.appendChild(panel);
      panel.querySelector('.close-msg').addEventListener('click', () => panel.remove());
      setTimeout(() => { if (panel.parentNode) panel.remove(); }, 14000);
    }

    async function activateSOS() {
      if (isSOSActive) return;
      isSOSActive = true;
      if (holdInterval) clearInterval(holdInterval);
      sosBtn.classList.remove('vibrating');
      sosBtn.classList.add('activated');
      sosTextSpan.innerText = "SOS ACTIVE";
      holdStatusSpan.innerText = "Alert sent to authorities & contacts!";
      holdStatusSpan.classList.add('active');
      statusBadge.classList.add('active-sos');
      statusTextSpan.innerText = "EMERGENCY";
      flashOverlay.classList.add('flash');
      if (navigator.vibrate) navigator.vibrate([400, 200, 400, 200]);

      if (!locationReady) await getLiveLocation();
      const locLink = getLocationLink();
      const address = locTextSpan.innerText;
      const emergencyMsg = `EMERGENCY SOS: I need immediate help! My real-time location is: ${locLink} (Address: ${address})`;
      
      console.log("[SOS Alert]", emergencyMsg);

      showSOSMessagePanel();
      showToast('Alerting contacts with live location...', 3500, 'Emergency Alert Sent');

      // Auto-trigger native SMS & WhatsApp to send the real location to all saved contacts
      if (contacts.length > 0) {
        const phoneNumbers = contacts.map(c => c.phone.replace(/[^0-9+]/g, '')).join(',');
        const encodedMsg = encodeURIComponent(emergencyMsg);
        
        // 1. Open WhatsApp immediately via popup
        setTimeout(() => {
          window.open(`https://wa.me/?text=${encodedMsg}`, '_blank');
        }, 300);

        // 2. Open SMS app right after
        setTimeout(() => {
          // iOS uses &, Android uses ? for SMS body appending
          const separator = /iPad|iPhone|iPod/.test(navigator.userAgent) ? '&' : '?';
          window.location.href = `sms:${phoneNumbers}${separator}body=${encodedMsg}`;
        }, 800);
      }

      if (voiceActive && window.speechSynthesis) {
        const utterance = new SpeechSynthesisUtterance("SOS activated. Emergency contacts have been notified with your live location.");
        window.speechSynthesis.speak(utterance);
      }

      setTimeout(() => { isSOSActive = false; }, 4000);
    }

    // ------------------------------ HOLD LOGIC -----------------------------------
    function startHold() {
      if (isSOSActive) { showToast("SOS already active", 1200); return; }
      sosBtn.classList.add('vibrating');
      holdStatusSpan.innerText = "Sending alert...";
      sosTextSpan.innerText = "HOLDING";
      holdProgress = 0;
      if (holdInterval) clearInterval(holdInterval);
      holdInterval = setInterval(() => {
        holdProgress += 4;
        let offset = maxOffset - (holdProgress / 100) * maxOffset;
        progressCircle.style.strokeDashoffset = offset;
        if (holdProgress >= 100) {
          clearInterval(holdInterval);
          holdInterval = null;
          sosBtn.classList.remove('vibrating');
          activateSOS();
        }
      }, 40);
    }

    function stopHold() {
      if (isSOSActive) return;
      if (holdInterval) {
        clearInterval(holdInterval);
        holdInterval = null;
      }
      sosBtn.classList.remove('vibrating');
      progressCircle.style.strokeDashoffset = maxOffset;
      holdStatusSpan.innerText = "Location ready • Press and hold";
      sosTextSpan.innerText = "HOLD FOR SOS";
      holdProgress = 0;
    }

    sosBtn.addEventListener('mousedown', startHold);
    sosBtn.addEventListener('mouseup', stopHold);
    sosBtn.addEventListener('mouseleave', stopHold);
    sosBtn.addEventListener('touchstart', startHold, { passive: false });
    sosBtn.addEventListener('touchend', stopHold);
    sosBtn.addEventListener('touchcancel', stopHold);

    // ------------------------------ REAL CALLS ----------------------------------
    function makeCall(number) {
      window.location.href = `tel:${number}`;
      showToast(`Calling ${number}...`, 1500);
    }
    policeBtn.addEventListener('click', () => makeCall('100'));
    ambulanceBtn.addEventListener('click', () => makeCall('108'));

    // ------------------------------ SHARE LOCATION ------------------------------
    shareLocationBtn.addEventListener('click', async () => {
      if (!locationReady) await getLiveLocation();
      const address = locTextSpan.innerText;
      const msg = `EMERGENCY: I need help. My live location: ${getLocationLink()} (${address})`;
      
      if (navigator.share) {
        try {
          await navigator.share({
            title: 'Emergency SOS Location',
            text: msg
          });
          showToast("Live location shared securely", 2000);
        } catch (err) {
          console.warn("Share cancelled or failed", err);
        }
      } else {
        // Fallback to WhatsApp
        const encoded = encodeURIComponent(msg);
        window.open(`https://wa.me/?text=${encoded}`, '_blank');
        showToast("Opened WhatsApp to share real location", 2000);
      }
    });

    // ------------------------------ CONTACTS (RENDER + INLINE ADD) --------------
    function renderContacts() {
      contactsListDiv.innerHTML = '';
      contacts.forEach(contact => {
        const row = document.createElement('div');
        row.className = 'contact-row';
        row.innerHTML = `
        <div class="avatar">${escapeHtml(contact.avatar.substring(0, 2))}</div>
        <div class="contact-info">
          <div class="contact-name">${escapeHtml(contact.name)}</div>
          <div class="contact-role">${escapeHtml(contact.phone)}</div>
        </div>
        <div style="display:flex; gap:8px;">
          <div class="call-btn" data-phone="${contact.phone}">
            <i class="fas fa-phone-alt"></i>
          </div>
          <div class="call-btn delete-btn" style="background:#fee2e2; color:#b91c1c;" data-id="${contact.id}">
            <i class="fas fa-trash-alt" style="font-size: 13px;"></i>
          </div>
        </div>
      `;
        contactsListDiv.appendChild(row);
      });
      
      // Bind call actions
      document.querySelectorAll('.call-btn[data-phone]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const phone = btn.getAttribute('data-phone');
          if (phone) makeCall(phone);
        });
      });
      
      // Bind delete actions
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.getAttribute('data-id');
          if (id) deleteContact(id);
        });
      });
    }

    function deleteContact(id) {
      const contactObj = contacts.find(c => c.id === id);
      if (contactObj) {
        contacts = contacts.filter(c => c.id !== id);
        renderContacts();
        showToast(`${contactObj.name} removed from emergency contacts`, 1800, "Contact Deleted");
      }
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // Show inline form
    showAddContactBtn.addEventListener('click', () => {
      inlineForm.style.display = 'block';
      contactNameInput.value = '';
      contactPhoneInput.value = '';
      contactNameInput.focus();
      // Scroll into view smoothly
      inlineForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // Cancel adding
    cancelAddBtn.addEventListener('click', () => {
      inlineForm.style.display = 'none';
    });

    // Save new contact
    saveContactBtn.addEventListener('click', () => {
      const name = contactNameInput.value.trim();
      let phone = contactPhoneInput.value.trim();
      if (!name) {
        showToast("Please enter a name", 1500);
        return;
      }
      if (!phone) {
        showToast("Please enter a phone number", 1500);
        return;
      }
      // Basic phone validation (just ensure not empty)
      const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      const newId = 'c' + Date.now();
      contacts.push({ id: newId, name: name, phone: phone, avatar: initials });
      renderContacts();
      inlineForm.style.display = 'none';
      showToast(`✓ ${name} added to emergency contacts`, 1800);
    });

    // ------------------------------ ALARM TOGGLE ---------------------------------
    function playSiren() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.15;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.6);
        osc.stop(audioCtx.currentTime + 0.6);
        audioCtx.resume();
      } catch (e) { }
    }
    alarmBox.addEventListener('click', () => {
      alarmActive = !alarmActive;
      if (alarmActive) {
        alarmBox.classList.add('on');
        showToast("Alarm activated (siren sound)", 1200);
        if (alarmInterval) clearInterval(alarmInterval);
        alarmInterval = setInterval(() => { if (alarmActive) playSiren(); }, 1800);
      } else {
        alarmBox.classList.remove('on');
        if (alarmInterval) clearInterval(alarmInterval);
        showToast("Alarm deactivated", 1000);
      }
    });

    // ------------------------------ VOICE ASSIST --------------------------------
    voiceBox.addEventListener('click', async () => {
      if (!voiceActive) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaStream = stream;
          voiceActive = true;
          voiceBox.classList.add('on');
          showToast("Voice assist ready • microphone active", 2000);
        } catch (err) {
          showToast("Microphone permission denied", 2000);
          voiceActive = false;
          voiceBox.classList.remove('on');
        }
      } else {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        voiceActive = false;
        voiceBox.classList.remove('on');
        showToast("Voice assist off", 1000);
      }
    });

    // ------------------------------ TOAST HELPER ---------------------------------
    function showToast(msg, duration = 2000, title = 'System Update') {
      toastTitle.innerText = title;
      toastDesc.innerText = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // ------------------------------ INITIALIZE ----------------------------------
    async function init() {
      // 1. Ask for Microphone permission immediately on load
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        voiceActive = true;
        voiceBox.classList.add('on');
      } catch (err) {
        console.warn("Mic permission denied at start up.");
      }

      // 2. Ask for Location permission implicitly without annoying toast alerts
      getLiveLocation();
      
      renderContacts();
      progressCircle.style.strokeDashoffset = maxOffset;
    }
    init();
  </script>
</body>

</html>
